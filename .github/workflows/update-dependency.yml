name: Update dependency

on:
  repository_dispatch:
    types: [dependency-updated]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show Node and NPM versions
        run: |
          node -v
          npm -v

      - run: npm install

      - run: npm install kschema-fs-api-gen-get-actions@latest

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: Update kschema-fs-api-gen-get-actions
          title: Update kschema-fs-api-gen-get-actions
          body: Update kschema-fs-api-gen-get-actions to latest
          branch: update-kschema-fs-api-gen-get-actions
          delete-branch: true
